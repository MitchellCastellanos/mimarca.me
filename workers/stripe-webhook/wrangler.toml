name = "mimarca-stripe-webhook"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Las plantillas de emails/ (raiz del repo) se importan como texto y quedan
# empaquetadas dentro del Worker al hacer deploy.
rules = [
  { type = "Text", globs = ["**/*.html"], fallthrough = true }
]

# Bucket R2 donde caen los logos/fotos subidos desde mi-cuenta (POST /upload).
# Crear con `npx wrangler r2 bucket create mimarca-portal-uploads` y habilitar
# acceso publico (o un dominio propio) para que R2_PUBLIC_BASE_URL sirva los
# archivos. Sin este binding, /upload responde 503 y el front cae al fallback
# de WhatsApp.
[[r2_buckets]]
binding = "PORTAL_UPLOADS"
bucket_name = "mimarca-portal-uploads"

# KV: secretos de cliente (ownerEmail/ownerToken), códigos de referido,
# redenciones y rate-limit de /access. Crear con:
#   npx wrangler kv namespace create mimarca-portal
[[kv_namespaces]]
binding = "PORTAL_KV"
id = "5936a9510e2d4b4e88c7bd6ba720763d"

# Secrets (configurar con `wrangler secret put <NOMBRE>`):
#   STRIPE_WEBHOOK_SECRET  - whsec_... del endpoint en el Stripe Dashboard
#   RESEND_API_KEY         - re_... de https://resend.com/api-keys
#   ADMIN_SECRET           - compartido para /notify/published y /notify/change-received
#
# Variables no sensibles:
[vars]
OWNER_ALERT_EMAIL = "contacto@mimarca.me"
FROM_EMAIL = "mimarca <pedidos@mimarca.me>"
SUPPORT_EMAIL = "contacto@mimarca.me"
R2_PUBLIC_BASE_URL = "https://uploads.mimarca.me"
