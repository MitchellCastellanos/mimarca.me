<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin · Mi Tarjeta Pro</title>
  <meta name="mitp-portal-api" content="https://mimarca-stripe-webhook.mimarca.workers.dev">
  <link rel="icon" href="../images/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../MyCSS.css">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width:520px;">
    <h1 class="h4 fw-bold mb-1">Admin · notificaciones</h1>
    <p class="text-muted small mb-4">Dispara los correos de “publicada” o “cambio recibido” sin usar la terminal. El secret no se guarda en el repo.</p>

    <div class="mb-3">
      <label class="form-label small fw-semibold" for="adminSecret">Admin secret</label>
      <input id="adminSecret" type="password" class="form-control" autocomplete="current-password" placeholder="X-Admin-Secret">
    </div>
    <div class="mb-3">
      <label class="form-label small fw-semibold" for="adminSlug">Slug del cliente</label>
      <input id="adminSlug" type="text" class="form-control" placeholder="lulu" pattern="[a-z0-9-]+">
    </div>
    <div class="mb-3">
      <label class="form-label small fw-semibold" for="adminCc">CC (opcional)</label>
      <input id="adminCc" type="email" class="form-control" placeholder="pedidos@mimarca.me">
      <div class="form-text small">Copia el correo a esta dirección — déjalo vacío para enviar solo al cliente.</div>
    </div>
    <div class="d-grid gap-2 mb-3">
      <button type="button" class="btn btn-dark" id="btnPublished">Avisar: tarjeta publicada</button>
      <button type="button" class="btn btn-outline-dark" id="btnChange">Avisar: cambio recibido</button>
    </div>
    <div id="adminNote" class="form-text small"></div>
    <p class="small text-muted mt-4 mb-0"><a href="../mi-cuenta/">← mi-cuenta</a></p>
  </div>

  <script>
    (function () {
      const apiMeta = document.querySelector('meta[name="mitp-portal-api"]');
      const apiBase = (apiMeta && apiMeta.getAttribute('content') || '').replace(/\/$/, '');
      const note = document.getElementById('adminNote');
      const secretInput = document.getElementById('adminSecret');
      const slugInput = document.getElementById('adminSlug');
      const ccInput = document.getElementById('adminCc');

      try {
        const saved = sessionStorage.getItem('mitp_admin_secret');
        if (saved) secretInput.value = saved;
      } catch (_) {}

      async function fire(path) {
        const secret = secretInput.value.trim();
        const slug = slugInput.value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
        if (!secret || !slug) {
          note.className = 'form-text small text-danger';
          note.textContent = 'Faltan secret o slug.';
          return;
        }
        try {
          sessionStorage.setItem('mitp_admin_secret', secret);
        } catch (_) {}

        note.className = 'form-text small';
        note.textContent = 'Enviando…';
        try {
          const res = await fetch(apiBase + path, {
            method: 'POST',
            headers: {
              'content-type': 'application/json',
              'X-Admin-Secret': secret,
            },
            body: JSON.stringify({ slug, cc: ccInput.value.trim() }),
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.error || ('HTTP ' + res.status));
          note.className = 'form-text small text-success';
          note.textContent = 'Listo — correo enviado.';
        } catch (err) {
          note.className = 'form-text small text-danger';
          note.textContent = 'Error: ' + (err && err.message ? err.message : 'falló');
        }
      }

      document.getElementById('btnPublished').addEventListener('click', () => fire('/notify/published'));
      document.getElementById('btnChange').addEventListener('click', () => fire('/notify/change-received'));
    })();
  </script>
</body>
</html>
